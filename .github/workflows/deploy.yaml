name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Debug User
        run: whoami

      - name: Setup Virtual Environment
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Stop Existing App
        run: |
          pkill -f app.py || true

      - name: Run Flask App
        run: |
          source venv/bin/activate
          setsid ./venv/bin/python app.py > app.log 2>&1 < /dev/null &
