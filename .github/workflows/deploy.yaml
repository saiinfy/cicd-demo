name: Flask CI/CD Pipeline
on:
  workflow_run:
    workflows: ["CodeQL Advanced"]
    types:
      - completed

jobs:
  dast:
    name: DAST Analysis (OWASP ZAP)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Flask App (for scanning)
        run: |
          source venv/bin/activate
          nohup python app.py &
          sleep 5
        env:
          FLASK_ENV: testing

      - name: Fix Permissions for ZAP                  # fixes PermissionError
        run: |
          chmod 777 ${{ github.workspace }}

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://127.0.0.1:5000"
          fail_action: false                            # won't fail pipeline on warnings
          artifact_name: zap-scan-report
          # removed rules_file_name — was causing rules file error

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-scan-report
          path: report_html.html

  deploy:
    name: Deploy Flask App
    runs-on: self-hosted
    needs: dast
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Virtual Environment
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Stop Existing App
        run: |
          pm2 delete flask-app || true

      - name: Run Flask App
        run: |
          pm2 start app.py --name flask-app --interpreter venv/bin/python
          pm2 save
